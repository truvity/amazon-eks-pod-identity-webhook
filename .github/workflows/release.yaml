name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  release-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/truvity/amazon-eks-pod-identity-webhook:${{ steps.tag.outputs.version }}
            ghcr.io/truvity/amazon-eks-pod-identity-webhook:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan-image:
    runs-on: ubuntu-latest
    needs: release-image
    permissions:
      contents: read
      security-events: write
      packages: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Extract tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ghcr.io/truvity/amazon-eks-pod-identity-webhook:${{ steps.tag.outputs.version }}
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH

      - uses: github/codeql-action/upload-sarif@b25d0ebf40e5b63ee81e1bd6e5d2a12b7c2aeb61 # v4
        if: always()
        with:
          sarif_file: trivy-image.sarif

  release-chart:
    runs-on: ubuntu-latest
    needs: release-image
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Extract tag
        id: tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set chart version from tag
        run: |
          sed -i "s/^version:.*/version: ${{ steps.tag.outputs.version }}/" chart/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: ${GITHUB_REF#refs/tags/}/" chart/Chart.yaml

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Package chart
        run: helm package chart/

      - name: Push chart to GHCR
        run: helm push $(ls amazon-eks-pod-identity-webhook-*.tgz) oci://ghcr.io/truvity/charts
